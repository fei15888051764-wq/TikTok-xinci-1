{{/* ===== Lunr.js Search Script (shared across all pages) ===== */}}
<script src="https://unpkg.com/lunr/lunr.js"></script>
<script>
(function() {
    // Build search index from ALL Hugo content
    var docs = [
        {{- $allSlang := where .Site.RegularPages "Type" "slang" }}
        {{- range $allSlang }}
        {
            "slug": {{ .Params.slug | default (.Title | urlize) | jsonify }},
            "title": {{ .Title | jsonify }},
            "permalink": {{ .Permalink | jsonify }},
            "definition": {{ .Params.definition | jsonify }},
            "tags": {{ (delimit (.Params.tags | default slice) " ") | jsonify }},
            "content": {{ .Plain | jsonify }}
        }{{ if ne . (index (last 1 $allSlang) 0) }},{{ end }}
        {{- end }}
    ];

    // Fix: Cloudflare HTML minifier may wrap jsonify output with extra quotes
    // Strip surrounding JSON quotes if present
    docs.forEach(function(doc) {
        ['slug', 'title', 'permalink', 'definition', 'tags', 'content'].forEach(function(key) {
            var v = doc[key] || '';
            if (typeof v === 'string' && v.length >= 2 && v.charAt(0) === '"' && v.charAt(v.length - 1) === '"') {
                try {
                    doc[key] = JSON.parse(v);
                } catch(e) {
                    doc[key] = v.slice(1, -1);
                }
            }
        });
    });

    // Pre-process docs: add derived fields for better matching
    var STOP_WORDS = {a:1,an:1,the:1,and:1,or:1,but:1,for:1,of:1,on:1,in:1,to:1,is:1,it:1,at:1,by:1,with:1,from:1,as:1};
    docs.forEach(function(doc) {
        var t = (doc.title || '').toLowerCase();
        doc.title_nospace = t.replace(/[^a-z0-9]/g, '');
        var keywords = t.split(/[^a-z0-9]+/).filter(function(w) { return w.length > 0 && !STOP_WORDS[w]; });
        doc.title_keywords_nospace = keywords.join('');
    });

    // Build Lunr index
    var idx = lunr(function() {
        this.ref('slug');
        this.field('title', { boost: 10 });
        this.field('title_nospace', { boost: 8 });
        this.field('definition', { boost: 5 });
        this.field('tags', { boost: 3 });
        this.field('content');
        docs.forEach(function(doc) { this.add(doc); }, this);
    });

    var searchInput = document.getElementById('search-input');
    var searchResults = document.getElementById('search-results');
    var allCards = document.querySelectorAll('.slang-card');
    var docMap = {};
    docs.forEach(function(doc) { docMap[doc.slug] = doc; });

    function stripSpace(s) {
        return (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function doSearch(query) {
        var q = query.trim();
        var qLower = q.toLowerCase();
        if (!qLower) {
            allCards.forEach(function(c) { c.style.display = ''; });
            searchResults.innerHTML = '';
            searchResults.classList.remove('active');
            return;
        }

        var matchedSlugs = [];
        var seen = {};
        function addSlug(s) { if (!seen[s]) { seen[s] = true; matchedSlugs.push(s); } }
        var qNoSpace = stripSpace(q);

        // Strategy 1: Lunr wildcard search
        try {
            idx.search(qLower + '*').forEach(function(r) { addSlug(r.ref); });
        } catch(e) {}

        // Strategy 2: Lunr fuzzy search (edit distance 1)
        try {
            idx.search(qLower + '~1').forEach(function(r) { addSlug(r.ref); });
        } catch(e) {}

        // Strategy 3: multi-word prefix search
        if (qLower.indexOf(' ') !== -1) {
            var words = qLower.split(/\s+/).filter(function(w) { return w.length > 0; });
            if (words.length > 1) {
                try {
                    idx.search(words.map(function(w) { return w + '*'; }).join(' ')).forEach(function(r) { addSlug(r.ref); });
                } catch(e) {}
                try {
                    idx.search(words.map(function(w) { return '+' + w + '*'; }).join(' ')).forEach(function(r) { addSlug(r.ref); });
                } catch(e) {}
            }
        }

        // Strategy 4: no-space full title matching
        if (qNoSpace.length >= 2) {
            docs.forEach(function(doc) {
                if (doc.title_nospace.indexOf(qNoSpace) !== -1) addSlug(doc.slug);
            });
        }

        // Strategy 5: no-space KEYWORD-ONLY matching (skips stop words like for/the/of)
        var qKeywords = qLower.split(/[^a-z0-9]+/).filter(function(w) { return w.length > 0 && !STOP_WORDS[w]; }).join('');
        if (qKeywords.length >= 2) {
            docs.forEach(function(doc) {
                if (!seen[doc.slug] && doc.title_keywords_nospace.indexOf(qKeywords) !== -1) {
                    addSlug(doc.slug);
                }
            });
        }

        // Strategy 6: fallback text search (AND logic for multi-word)
        var queryWords = qLower.split(/\s+/).filter(function(w) { return w.length > 0; });
        docs.forEach(function(doc) {
            if (seen[doc.slug]) return;

            var titleText = (doc.title || '').toLowerCase();
            var defText = (doc.definition || '').toLowerCase();
            var tagText = (doc.tags || '').toLowerCase();
            var allText = titleText + ' ' + defText + ' ' + tagText;

            // 6a: full query as substring
            if (allText.indexOf(qLower) !== -1) { addSlug(doc.slug); return; }

            // 6b: each query word must appear somewhere (AND logic)
            if (queryWords.length > 1) {
                var allWordsMatch = queryWords.every(function(word) {
                    return titleText.indexOf(word) !== -1 || defText.indexOf(word) !== -1 || tagText.indexOf(word) !== -1;
                });
                if (allWordsMatch) { addSlug(doc.slug); return; }
            }

            // 6c: single word - prefix match in any word
            if (queryWords.length === 1 && queryWords[0].length >= 2) {
                var word = queryWords[0];
                var allWords = allText.split(/\s+/);
                if (allWords.some(function(w) { return w.indexOf(word) === 0; })) {
                    addSlug(doc.slug);
                }
            }
        });

        // Sort by relevance
        matchedSlugs.sort(function(a, b) {
            var docA = docMap[a], docB = docMap[b];
            if (!docA || !docB) return 0;
            var aT = (docA.title || '').toLowerCase();
            var bT = (docB.title || '').toLowerCase();
            var aScore = aT === qLower ? 4 : aT.indexOf(qLower) === 0 ? 3 : aT.indexOf(qLower) !== -1 ? 2 : 1;
            var bScore = bT === qLower ? 4 : bT.indexOf(qLower) === 0 ? 3 : bT.indexOf(qLower) !== -1 ? 2 : 1;
            return bScore - aScore;
        });

        // Filter visible cards on homepage
        if (allCards.length > 0) {
            allCards.forEach(function(card) {
                var onclick = card.getAttribute('onclick') || '';
                var m = onclick.match(/\/slang\/([^'"\/]+)/);
                var cardSlug = m ? m[1] : '';
                var decodedSlug = decodeURIComponent(cardSlug);
                var isMatch = matchedSlugs.some(function(s) {
                    return s === cardSlug || s === decodedSlug || decodeURIComponent(s) === decodedSlug;
                });
                card.style.display = isMatch ? '' : 'none';
            });
        }

        // Build dropdown results
        var html = '';
        if (matchedSlugs.length === 0) {
            html = '<div class="search-no-results">No results for "' + esc(q) + '"</div>';
        } else {
            html = '<div class="search-count">' + matchedSlugs.length + ' result' + (matchedSlugs.length > 1 ? 's' : '') + '</div>';
            matchedSlugs.slice(0, 8).forEach(function(slug) {
                var doc = docMap[slug];
                if (doc) {
                    html += '<a href="' + doc.permalink + '" class="search-result-item">' +
                        '<div class="search-result-title">' + esc(doc.title) + '</div>' +
                        '<div class="search-result-definition">' + esc((doc.definition || '').substring(0, 80)) + '...</div></a>';
                }
            });
        }
        searchResults.innerHTML = html;
        searchResults.classList.add('active');
    }

    function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    var debounceTimer;
    searchInput.addEventListener('input', function(e) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() { doSearch(e.target.value); }, 200);
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doSearch(searchInput.value); }
    });

    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.classList.remove('active');
        }
    });

    searchInput.addEventListener('focus', function() {
        if (searchInput.value.trim()) searchResults.classList.add('active');
    });
})();
</script>
