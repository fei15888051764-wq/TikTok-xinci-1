{{/* OG Image - overrides PaperMod default */}}
{{- $ogImage := "/og-image.svg" }}
{{- if and .Params.image (ne .Params.image "") }}
  {{- $ogImage = .Params.image }}
{{- end }}
<meta property="og:image" content="{{ $ogImage | absURL }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

{{/* Twitter Card - force summary_large_image for better visibility */}}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@tiktokslangdict">
<meta name="twitter:creator" content="@tiktokslangdict">
<meta name="twitter:image" content="{{ $ogImage | absURL }}">
