{{ define "main" }}
<div class="home-container">
    <!-- Left Sidebar Ad (Desktop Only) -->
    <aside class="sidebar-ad" aria-label="Advertisement">
        <div class="ad-placeholder-sidebar">
            <span>ADVERTISEMENT</span>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Back to Home Link -->
        <div class="back-to-home">
            <a href="{{ .Site.BaseURL }}" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
                Back to Home
            </a>
        </div>

        <!-- Section Title -->
        <h1 class="section-title">All Tags</h1>

        <!-- Tags Grid - Using .Pages for Hugo 0.146 compatibility -->
        <div class="tags-grid">
            {{- range sort .Pages "Title" }}
            <a href="{{ .Permalink }}" class="tag-pill">
                <span class="tag-pill-name">{{ .Title }}</span>
                <span class="tag-pill-count">{{ len .Pages }}</span>
            </a>
            {{- end }}
        </div>
    </div>

    <!-- Right Sidebar Ad (Desktop Only) -->
    <aside class="sidebar-ad" aria-label="Advertisement">
        <div class="ad-placeholder-sidebar">
            <span>ADVERTISEMENT</span>
        </div>
    </aside>
</div>
{{ end }}
