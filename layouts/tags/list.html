{{ define "main" }}
<div class="home-container">
    <!-- Left Sidebar Ad (Desktop Only) -->
    <aside class="sidebar-ad" aria-label="Advertisement">
        <div class="ad-placeholder-sidebar">
            <span>AD</span>
        </div>
    </aside>

    <div class="main-content">
        {{- partial "search-box.html" . }}

        <div class="back-to-home">
            <a href="{{ .Site.BaseURL }}" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
                Back to Home
            </a>
        </div>

        <h1 class="section-title">All Tags</h1>

        <!-- Mobile Banner Ad: Above tags -->
        <div class="mobile-banner-ad" id="ad-tags-above">
            <div class="ad-placeholder-banner">
                <span>AD</span>
            </div>
        </div>

        <div class="tags-grid">
            {{- range .Data.Terms.Alphabetical }}
            <a href="{{ .Page.Permalink }}" class="tag-pill">
                <span class="tag-pill-name">{{ .Page.Title }}</span>
                <span class="tag-pill-count">{{ .Count }}</span>
            </a>
            {{- end }}
        </div>

        <!-- Mobile Banner Ad: Below tags -->
        <div class="mobile-banner-ad" id="ad-tags-below">
            <div class="ad-placeholder-banner">
                <span>AD</span>
            </div>
        </div>
    </div>

    <!-- Right Sidebar Ad (Desktop Only) -->
    <aside class="sidebar-ad" aria-label="Advertisement">
        <div class="ad-placeholder-sidebar">
            <span>AD</span>
        </div>
    </aside>
</div>

{{- partial "search-script.html" . }}
{{ end }}
