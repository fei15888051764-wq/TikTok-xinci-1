{{ define "main" }}
<div class="home-container">
    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Back to Home Link -->
        <div class="back-to-home">
            <a href="{{ .Site.BaseURL }}" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
                Back to Home
            </a>
        </div>

        <!-- Section Title -->
        <h1 class="section-title">All Tags</h1>

        <!-- Tags Grid - Using .Data.Terms with .Count for reliable count display -->
        <div class="tags-grid">
            {{- range .Data.Terms.Alphabetical }}
            <a href="{{ .Page.Permalink }}" class="tag-pill">
                <span class="tag-pill-name">{{ .Page.Title }}</span>
                <span class="tag-pill-count">{{ .Count }}</span>
            </a>
            {{- end }}
        </div>
    </div>
</div>
{{ end }}
