baseURL: "https://tokslangdict.com"
languageCode: "en-us"
title: "TikTok Slang Dictionary"
theme: "PaperMod"

pagination:
  pagerSize: 12
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

# Sitemap configuration (Google 2026 SEO)
sitemap:
  changefreq: "weekly"
  priority: 0.8
  filename: "sitemap.xml"

# Enable JSON output for Lunr search + RSS for feed readers
outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "TikTok Slang Dictionary"
  description: "Your ultimate guide to TikTok slang, Gen-Z lingo, and viral internet terms. Stay updated with the latest trending words."
  keywords: ["TikTok", "Slang", "Dictionary", "Gen-Z", "Viral", "Trending Words"]
  author: "GEBILAOWANG"
  defaultTheme: light
  disableThemeToggle: true
  DateFormat: "January 2, 2006"
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: false
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  hideFooter: false
  mainSections: ["slang"]

  # Author Information (E-E-A-T for Google 2026)
  authorInfo:
    name: "GEBILAOWANG"
    bio: "Independent internet culture researcher and lexicographer specializing in TikTok slang, Gen Z and Gen Alpha communication patterns, and viral linguistic phenomena. Active in the field since 2024. For corrections or collaboration: fei15888051764@gmail.com"
    email: "fei15888051764@gmail.com"
    url: "https://tokslangdict.com"
    twitter: "@tiktokslangdict"
    github: "tiktokslangdictionary"
    since: 2024

  # Open Graph / Social Media
  og:
    type: "website"
    locale: "en_US"
    site_name: "TikTok Slang Dictionary"
    image: "/og-image.png"
    imageWidth: 1200
    imageHeight: 630

  # Twitter Card
  twitter:
    card: "summary_large_image"
    site: "@tiktokslangdict"
    creator: "@tiktokslangdict"

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.ico"
    favicon32x32: "/favicon-32x32.ico"
    apple_touch_icon: "/apple-touch-icon.ico"
    safari_pinned_tab: "/safari-pinned-tab.ico"

  label:
    text: "TikTok Slang Dictionary"
    icon: ""
    iconHeight: 0

  # Home page parameters
  homeInfoParams:
    Title: ""
    Content: ""

  socialIcons:
    - name: "x"
      url: "https://x.com/tiktokslangdict"
    - name: "github"
      url: "https://github.com/tiktokslangdictionary"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: ""
    Text: ""
    appendFilePath: false

menu:
  main:
    - identifier: "tags"
      name: "Tags"
      url: "/tags/"
      weight: 10
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 20
    - identifier: "contact"
      name: "Contact"
      url: "/contact/"
      weight: 30

# Only keep 'tags' taxonomy, remove 'categories' to avoid /categories/slang/ in sitemap
taxonomies:
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
