baseURL: "https://tokslangdict.com"
languageCode: "en-us"
title: "TikTok Slang Dictionary"
theme: "PaperMod"

pagination:
  pagerSize: 999
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

sitemap:
  changefreq: "weekly"
  priority: 0.8
  filename: "sitemap.xml"

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
    - RSS

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "TikTok Slang Dictionary"
  description: "Your ultimate guide to TikTok slang, Gen-Z lingo, and viral internet terms. Stay updated with the latest trending words."
  keywords: ["TikTok", "Slang", "Dictionary", "Gen-Z", "Viral", "Trending Words"]
  author: "GEBILAOWANG"
  defaultTheme: light
  disableThemeToggle: true
  DateFormat: "January 2, 2006"
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: false
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  hideFooter: false
  mainSections: ["slang"]

  permalinks:
    slang: "/:slug/"

  authorInfo:
    name: "GEBILAOWANG"
    bio: "Independent digital content creator, researcher, and online lexicographer building authoritative niche websites and in-depth content across gaming culture, social media trends, technology, and internet linguistics. Known for comprehensive slang dictionaries, digital trend analysis, and cultural documentation. Active in the field since 2024."
    email: "fei15888051764@gmail.com"
    url: "https://tokslangdict.com"
    twitter: "@GEBILAOWANG_WYF"
    since: 2024

  og:
    type: "website"
    locale: "en_US"
    site_name: "TikTok Slang Dictionary"
    image: "/og-image.svg"
    imageWidth: 1200
    imageHeight: 630

  twitter:
    card: "summary_large_image"
    site: "@GEBILAOWANG_WYF"
    creator: "@GEBILAOWANG_WYF"

  assets:
    disableHLJS: true
    favicon: "/favicon.svg"
    favicon16x16: "/favicon.svg"
    favicon32x32: "/favicon.svg"
    apple_touch_icon: "/favicon.svg"
    safari_pinned_tab: "/favicon.svg"

  schema:
    publisherType: "Organization"

  label:
    text: "TikTok Slang Dictionary"
    icon: ""
    iconHeight: 0

  homeInfoParams:
    Title: ""
    Content: ""
